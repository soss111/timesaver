<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tööaja Salvestaja</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #111214;
  --card: #18191d;
  --card2: #1f2024;
  --border: #2a2b30;
  --border2: #35363c;
  --accent: #5b9cf6;
  --accent-glow: rgba(91,156,246,0.15);
  --green: #3dd68c;
  --green-glow: rgba(61,214,140,0.12);
  --red: #f76b6b;
  --yellow: #f5c842;
  --text: #e2e4e9;
  --text2: #9097a5;
  --text3: #565c6b;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding-bottom: 80px; }

.topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; }
.clock { font-family: var(--mono); font-size: 13px; color: var(--text2); }

.main { max-width: 700px; margin: 0 auto; padding: 20px 16px; }

.meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.field { margin-bottom: 10px; }
.fl { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 5px; }

input[type="date"], input[type="text"] {
  width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 9px 12px; border-radius: var(--r); font-family: var(--mono); font-size: 12px;
  outline: none; transition: border-color 0.15s; color-scheme: dark;
}
input:focus { border-color: var(--accent); }

.sec-head {
  font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.15em; padding: 18px 0 8px; display: flex; align-items: center; gap: 8px;
}
.sec-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.act {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
  margin-bottom: 7px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
}
.act.running {
  border-color: var(--green);
  box-shadow: 0 0 0 1px rgba(61,214,140,0.08), inset 0 0 28px rgba(61,214,140,0.05);
}
.act.done { border-color: var(--border2); }

.act-head {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
}

.ss-btn {
  width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border2);
  background: var(--card2); color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; flex-shrink: 0;
}
.ss-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-glow); }
.act.running .ss-btn { background: var(--red); border-color: var(--red); color: #fff; }
.ss-btn svg { width: 13px; height: 13px; pointer-events: none; }

.act-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; flex: 1; }
.act.running .act-name { color: var(--green); }

.timer {
  font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text3);
  min-width: 72px; text-align: right; letter-spacing: 0.04em; flex-shrink: 0;
}
.act.running .timer { color: var(--green); }
.act.done .timer { color: var(--text); }

.notes-tog {
  font-size: 14px; color: var(--text3); cursor: pointer;
  padding: 6px; border-radius: 4px; transition: color 0.15s;
  user-select: none; flex-shrink: 0; line-height: 1;
}
.notes-tog:hover { color: var(--accent); }
.notes-tog.active { color: var(--accent); }

.act-body { overflow: hidden; max-height: 0; transition: max-height 0.22s ease; }
.act-body.open { max-height: 200px; }
.act-notes { padding: 0 14px 12px 60px; }
textarea {
  width: 100%; background: var(--card2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 11px; border-radius: 6px; font-family: var(--sans); font-size: 12px;
  line-height: 1.5; resize: none; outline: none; min-height: 56px; transition: border-color 0.15s;
}
textarea:focus { border-color: var(--accent); }

.total-bar {
  background: var(--card2); border: 1px solid var(--border); border-radius: var(--r);
  padding: 10px 14px; margin-top: 14px; display: flex; justify-content: space-between; align-items: center;
}
.total-lbl { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.total-val { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--yellow); }

.status { font-family: var(--mono); font-size: 11px; padding: 10px 14px; border-radius: var(--r); margin-top: 12px; display: none; }
.status.show { display: block; }
.status.ok   { background: var(--green-glow); border: 1px solid rgba(61,214,140,0.3); color: var(--green); }
.status.err  { background: rgba(247,107,107,0.1); border: 1px solid rgba(247,107,107,0.3); color: var(--red); }
.status.wait { background: var(--accent-glow); border: 1px solid rgba(91,156,246,0.3); color: var(--accent); }

.bot {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-top: 1px solid var(--border);
  padding: 12px 20px; display: flex; gap: 10px; align-items: center; justify-content: center;
}
.btn-save {
  flex: 1; max-width: 340px; background: var(--accent); color: #fff; border: none;
  padding: 12px 20px; border-radius: var(--r); font-family: var(--mono); font-size: 12px;
  font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
}
.btn-save:hover { background: #4a8de8; }
.btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-reset {
  background: transparent; border: 1px solid var(--border2); color: var(--text3);
  padding: 12px 16px; border-radius: var(--r); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: all 0.15s;
}
.btn-reset:hover { border-color: var(--red); color: var(--red); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.act.running .timer { animation: pulse 1.6s ease-in-out infinite; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">&#9201; Tööaja Log</div>
  <div id="wallclock" class="clock"></div>
</div>

<div class="main">

  <div class="meta-row">
    <div class="field">
      <div class="fl">Kuupäev</div>
      <input type="date" id="date" />
    </div>
    <div class="field">
      <div class="fl">Operaator / Masin</div>
      <input type="text" id="operator" placeholder="nt. Jaan / CNC-01" />
    </div>
  </div>
  <div class="field">
    <div class="fl">Töö / Detaili kirjeldus</div>
    <input type="text" id="jobDesc" placeholder="nt. Detaili nr 4471 freesimine" />
  </div>

  <div class="sec-head">Tegevused</div>
  <div id="actsContainer"></div>

  <div class="total-bar">
    <span class="total-lbl">Kogu aeg</span>
    <span class="total-val" id="totalTime">00:00:00</span>
  </div>

  <div class="status" id="statusEl"></div>

</div>

<div class="bot">
  <button class="btn-reset" onclick="resetAll()">Nulli</button>
  <button class="btn-save" id="saveBtn" onclick="saveToSheets()">&#128190; Salvesta tabelisse</button>
</div>

<script>
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzQ1RrZTFkNW197WS93GEwfooVVTiR0US89zjFM4o3RYMawIIL5MfiLj7Q3FQJGhbq6/exec';

const ACTS = [
  { id:'prep',    name:'Ettevalmistus (tööriistad, materjal, puhastus)' },
  { id:'zero',    name:'Nullpunktid, ofsetid' },
  { id:'tools',   name:'Tööriistade sisestus / vahetus' },
  { id:'first',   name:'Esimese detaili töötlemine' },
  { id:'check',   name:'Esimese detaili kontroll' },
  { id:'reSetup', name:'Kordus-seadistus (kui esines)' },
  { id:'inline',  name:'Inline mõõtmised' },
  { id:'report',  name:'Raporteerimine' },
  { id:'breaks',  name:'Muud katkestused' },
];

var S = {};
ACTS.forEach(function(a) {
  S[a.id] = { running:false, elapsed:0, startTs:null, startWall:null, endWall:null, notes:'' };
});
var tick = null;

function buildUI() {
  var c = document.getElementById('actsContainer');
  c.innerHTML = '';
  ACTS.forEach(function(a) {
    var card = document.createElement('div');
    card.className = 'act'; card.id = 'act_' + a.id;

    var head = document.createElement('div');
    head.className = 'act-head';

    var btn = document.createElement('button');
    btn.className = 'ss-btn'; btn.id = 'btn_' + a.id;
    btn.innerHTML = svgPlay();
    btn.onclick = (function(id){ return function(){ toggle(id); }; })(a.id);

    var nameEl = document.createElement('span');
    nameEl.className = 'act-name'; nameEl.textContent = a.name;

    var timerEl = document.createElement('div');
    timerEl.className = 'timer'; timerEl.id = 't_' + a.id; timerEl.textContent = '00:00';

    var tog = document.createElement('span');
    tog.className = 'notes-tog'; tog.title = 'Märkused'; tog.textContent = '✎';
    tog.onclick = (function(id){ return function(){ toggleNotes(id); }; })(a.id);

    head.appendChild(btn); head.appendChild(nameEl); head.appendChild(timerEl); head.appendChild(tog);
    card.appendChild(head);

    var body = document.createElement('div');
    body.className = 'act-body'; body.id = 'body_' + a.id;
    var wrap = document.createElement('div'); wrap.className = 'act-notes';
    var ta = document.createElement('textarea');
    ta.id = 'n_' + a.id; ta.placeholder = 'Märkused...'; ta.rows = 2;
    ta.oninput = (function(id){ return function(){ S[id].notes = this.value; }; })(a.id);
    wrap.appendChild(ta); body.appendChild(wrap); card.appendChild(body);
    c.appendChild(card);
  });
}

function svgPlay() { return '<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,3 20,12 6,21"/></svg>'; }
function svgStop() { return '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'; }

function toggle(id) {
  var s = S[id];
  if (!s.running) {
    ACTS.forEach(function(a) { if (a.id !== id && S[a.id].running) stopTimer(a.id); });
    s.running = true;
    s.startTs = Date.now() - s.elapsed * 1000;
    s.startWall = wall();
    document.getElementById('act_' + id).className = 'act running';
    document.getElementById('btn_' + id).innerHTML = svgStop();
    ensureTick();
  } else {
    stopTimer(id);
  }
}

function stopTimer(id) {
  var s = S[id];
  if (!s.running) return;
  s.running = false;
  s.elapsed = Math.floor((Date.now() - s.startTs) / 1000);
  s.endWall = wall();
  document.getElementById('act_' + id).className = 'act done';
  document.getElementById('btn_' + id).innerHTML = svgPlay();
  renderTimer(id); updateTotal();
}

function ensureTick() {
  if (tick) return;
  tick = setInterval(function() {
    var any = false;
    ACTS.forEach(function(a) {
      if (S[a.id].running) {
        any = true;
        S[a.id].elapsed = Math.floor((Date.now() - S[a.id].startTs) / 1000);
        renderTimer(a.id);
      }
    });
    updateTotal();
    if (!any) { clearInterval(tick); tick = null; }
  }, 500);
}

function renderTimer(id) { document.getElementById('t_' + id).textContent = fmtMM(S[id].elapsed); }
function updateTotal() {
  var tot = ACTS.reduce(function(s, a) { return s + S[a.id].elapsed; }, 0);
  document.getElementById('totalTime').textContent = fmtHH(tot);
}
function fmtMM(s) { var m=Math.floor(s/60),se=s%60; if(m>=60){var h=Math.floor(m/60);return p(h)+':'+p(m%60)+':'+p(se);} return p(m)+':'+p(se); }
function fmtHH(s) { return p(Math.floor(s/3600))+':'+p(Math.floor((s%3600)/60))+':'+p(s%60); }
function p(n) { return String(n).padStart(2,'0'); }
function wall() { var d=new Date(); return p(d.getHours())+':'+p(d.getMinutes()); }

function toggleNotes(id) {
  var body = document.getElementById('body_' + id);
  var tog = document.querySelector('#act_' + id + ' .notes-tog');
  body.classList.toggle('open');
  tog.classList.toggle('active', body.classList.contains('open'));
  if (body.classList.contains('open')) document.getElementById('n_' + id).focus();
}

function resetAll() {
  if (!confirm('Nulli kõik ajad?')) return;
  ACTS.forEach(function(a) {
    var s=S[a.id]; s.running=false; s.elapsed=0; s.startTs=null; s.startWall=null; s.endWall=null; s.notes='';
    document.getElementById('act_'+a.id).className='act';
    document.getElementById('btn_'+a.id).innerHTML=svgPlay();
    document.getElementById('t_'+a.id).textContent='00:00';
    document.getElementById('n_'+a.id).value='';
    document.getElementById('body_'+a.id).classList.remove('open');
    document.querySelector('#act_'+a.id+' .notes-tog').classList.remove('active');
  });
  if (tick){clearInterval(tick);tick=null;}
  updateTotal(); hideStatus();
}

async function saveToSheets() {
  ACTS.forEach(function(a) { if (S[a.id].running) stopTimer(a.id); });

  var date = document.getElementById('date').value;
  var op   = document.getElementById('operator').value.trim();
  var job  = document.getElementById('jobDesc').value.trim();
  var ts   = new Date().toLocaleString('et-EE');

  if (!date) { showStatus('⚠️ Kuupäev puudub.', 'err'); return; }

  var rows = ACTS.map(function(a) {
    var s = S[a.id];
    return [date, op, job, a.name, s.startWall||'', s.endWall||'',
            s.elapsed > 0 ? (s.elapsed/60).toFixed(2) : '0', fmtHH(s.elapsed), s.notes, ts];
  });

  showStatus('⏳ Salvestamine...', 'wait');
  document.getElementById('saveBtn').disabled = true;

  try {
    await fetch(WEBAPP_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ rows: rows }),
    });
    showStatus('✓ ' + rows.length + ' rida saadetud — ' + ts, 'ok');
  } catch(e) {
    showStatus('❌ Viga: ' + e.message, 'err');
  }

  document.getElementById('saveBtn').disabled = false;
}

function showStatus(m, t) { var el=document.getElementById('statusEl'); el.textContent=m; el.className='status show '+t; }
function hideStatus() { document.getElementById('statusEl').className='status'; }

function tickClock() {
  var d = new Date();
  document.getElementById('wallclock').textContent =
    d.toLocaleDateString('et-EE',{weekday:'short',day:'numeric',month:'numeric'}) +
    ' ' + p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());
}

window.onload = function() {
  document.getElementById('date').value = new Date().toISOString().split('T')[0];
  buildUI(); tickClock(); setInterval(tickClock, 1000);
};
</script>
</body>
</html>
